name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install tools
        run: pip install nbformat nbqa ruff

      - name: Validate notebook format
        run: |
          python - <<'EOF'
          import nbformat, glob, sys
          errors = []
          for path in glob.glob("**/*.ipynb", recursive=True):
              try:
                  with open(path) as f:
                      nb = nbformat.read(f, as_version=4)
                  nbformat.validate(nb)
                  print(f"OK: {path}")
              except Exception as e:
                  errors.append(f"FAIL: {path} — {e}")
          if errors:
              print("\n".join(errors))
              sys.exit(1)
          EOF

      - name: Lint notebooks
        run: nbqa ruff . --ignore=E402,E501

      - name: Check for leaked secrets in outputs
        run: |
          python - <<'EOF'
          import json, glob, sys, re
          pattern = re.compile(r'sk-ant-[a-zA-Z0-9\-_]{20,}')
          found = []
          for path in glob.glob("**/*.ipynb", recursive=True):
              with open(path) as f:
                  nb = json.load(f)
              for cell in nb.get("cells", []):
                  for output in cell.get("outputs", []):
                      text = json.dumps(output)
                      if pattern.search(text):
                          found.append(path)
          if found:
              print("API key leaked in outputs:", found)
              sys.exit(1)
          print("No secrets found in outputs.")
          EOF
